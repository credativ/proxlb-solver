name: "Infeasible — Affinity Group Exceeds Node Capacity"
description: >
  Three VMs in an affinity group must all be colocated, but their
  combined RAM exceeds the capacity of every individual node.

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  app-01:
    node: node-A
    cpu: 2
    memory_gb: 24
    type: vm
  app-02:
    node: node-A
    cpu: 2
    memory_gb: 24
    type: vm
  app-03:
    node: node-B
    cpu: 2
    memory_gb: 24
    type: vm

constraints:
  affinity:
    - name: big-group
      vms: [app-01, app-02, app-03]

expect:
  feasible: false
