name: "Hard Constraints — Anti-Affinity Conflict"
description: >
  Identical to soft_constraints.yaml but with hard: true.
  Three VMs with mutual anti-affinity, but only two nodes available.
  Since the rule is HARD, no valid placement exists.

balancing:
  method: memory
  balanciness: 5

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64}
  node-B: {cpu_total: 10, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 1, memory_gb: 4}
  vm-2: {node: node-B, cpu: 1, memory_gb: 4}
  vm-3: {node: node-A, cpu: 1, memory_gb: 4}

constraints:
  anti_affinity:
    - name: "Hard-AA"
      vms: ["vm-1", "vm-2", "vm-3"]
      hard: true

expect:
  feasible: false
