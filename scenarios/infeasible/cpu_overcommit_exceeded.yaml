name: "CPU Overcommit — Exceeded"
description: >
  30 vCPUs on a 16-core node with 1.5 overcommit (limit 24). Should be infeasible.

balancing:
  method: cpu
  balanciness: 1
  cpu_overcommit: 1.5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 15, memory_gb: 8}
  vm-2: {node: node-A, cpu: 15, memory_gb: 8}

expect:
  feasible: false
