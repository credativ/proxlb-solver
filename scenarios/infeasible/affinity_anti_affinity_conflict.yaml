name: "Infeasible — Affinity vs Anti-Affinity Conflict"
description: >
  VM-A and VM-B must be on the same node (affinity), but VM-B
  and VM-C must be on different nodes (anti-affinity), and VM-A
  and VM-C must also be on the same node (affinity). This creates
  a contradiction: A=B, A=C implies B=C, but B!=C is required.

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-a:
    node: node-A
    cpu: 2
    memory_gb: 8
    type: vm
  vm-b:
    node: node-A
    cpu: 2
    memory_gb: 8
    type: vm
  vm-c:
    node: node-B
    cpu: 2
    memory_gb: 8
    type: vm

constraints:
  affinity:
    - name: group-ab
      vms: [vm-a, vm-b]
    - name: group-ac
      vms: [vm-a, vm-c]
  anti_affinity:
    - name: sep-bc
      vms: [vm-b, vm-c]

expect:
  feasible: false
