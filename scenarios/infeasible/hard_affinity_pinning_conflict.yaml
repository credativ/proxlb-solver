name: "Hard Constraints — Affinity vs Pinning Conflict"
description: >
  Identical to soft_affinity.yaml but with hard: true.
  vm-1 and vm-2 must be together (HARD).
  But vm-1 is pinned to Node-A and vm-2 is pinned to Node-B (HARD).
  The intersection of allowed nodes is empty. Validator should catch this.

balancing:
  method: memory
  balanciness: 1

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64}
  node-B: {cpu_total: 10, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 1, memory_gb: 4}
  vm-2: {node: node-B, cpu: 1, memory_gb: 4}

constraints:
  affinity:
    - name: "Hard-Aff"
      vms: ["vm-1", "vm-2"]
      hard: true
  pin:
    - {vm: "vm-1", nodes: ["node-A"]}
    - {vm: "vm-2", nodes: ["node-B"]}

expect:
  feasible: false
