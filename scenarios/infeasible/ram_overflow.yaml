name: "Infeasible — RAM Overflow"
description: >
  Total VM memory exceeds total cluster capacity.
  No valid placement exists regardless of distribution.

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 32
  node-B:
    cpu_total: 16
    memory_total_gb: 32

vms:
  big-01:
    node: node-A
    cpu: 2
    memory_gb: 24
    type: vm
  big-02:
    node: node-A
    cpu: 2
    memory_gb: 24
    type: vm
  big-03:
    node: node-B
    cpu: 2
    memory_gb: 24
    type: vm

expect:
  feasible: false
