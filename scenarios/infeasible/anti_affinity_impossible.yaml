name: "Infeasible — Anti-Affinity Impossible"
description: >
  Three VMs are mutually anti-affine but only two nodes exist.
  At least two VMs would have to share a node, violating
  the constraint.

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  db-01:
    node: node-A
    cpu: 2
    memory_gb: 8
    type: vm
  db-02:
    node: node-A
    cpu: 2
    memory_gb: 8
    type: vm
  db-03:
    node: node-B
    cpu: 2
    memory_gb: 8
    type: vm

constraints:
  anti_affinity:
    - name: all-separate
      vms: [db-01, db-02, db-03]

expect:
  feasible: false
