name: "Production Cluster Rebalance"
description: "8 VMs across 5 nodes — pin constraints force a multi-step cascade through nearly-full nodes."

balancing:
  method: memory
  balanciness: 5
  cpu_overcommit: 2.0

nodes:
  pve-01:
    cpu_total: 32
    memory_total_gb: 128
  pve-02:
    cpu_total: 32
    memory_total_gb: 128
  pve-03:
    cpu_total: 32
    memory_total_gb: 128
  pve-04:
    cpu_total: 32
    memory_total_gb: 128
  pve-05:
    cpu_total: 32
    memory_total_gb: 128

vms:
  # pve-01: 128 GB (100%)
  db-primary:
    node: pve-01
    cpu: 8
    memory_gb: 80
    type: vm
  app-api-01:
    node: pve-01
    cpu: 4
    memory_gb: 48
    type: vm
  # pve-02: 128 GB (100%)
  db-replica:
    node: pve-02
    cpu: 8
    memory_gb: 80
    type: vm
  app-api-02:
    node: pve-02
    cpu: 4
    memory_gb: 48
    type: vm
  # pve-03: 112 GB (87.5%)
  cache-01:
    node: pve-03
    cpu: 8
    memory_gb: 80
    type: vm
  web-proxy:
    node: pve-03
    cpu: 4
    memory_gb: 32
    type: vm
  # pve-04: 48 GB (37.5%)
  monitoring:
    node: pve-04
    cpu: 4
    memory_gb: 32
    type: vm
  logging:
    node: pve-04
    cpu: 2
    memory_gb: 16
    type: vm
  # pve-05: empty

constraints:
  pin:
    - vm: app-api-01
      nodes: [pve-02]
    - vm: app-api-02
      nodes: [pve-03]

expect:
  feasible: true
  constraints_satisfied: true
  spread_improved: true
  placements:
    app-api-01: pve-02
    app-api-02: pve-03
