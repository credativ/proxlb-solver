name: "Circular Swap"
description: "VM-A and VM-B must swap nodes, but both nodes are too full — requires a temp move."

balancing:
  method: memory
  balanciness: 5
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-a:
    node: node-A
    cpu: 4
    memory_gb: 50
    type: vm
  vm-b:
    node: node-B
    cpu: 4
    memory_gb: 50
    type: vm

constraints:
  pin:
    - vm: vm-a
      nodes: [node-B]
    - vm: vm-b
      nodes: [node-A]

expect:
  feasible: true
  constraints_satisfied: true
  placements:
    vm-a: node-B
    vm-b: node-A
