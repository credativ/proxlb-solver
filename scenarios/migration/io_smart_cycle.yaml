name: "IO Smart — Dependency Cycle"
description: >
  Rebalancing IO pressure requires moving a VM to a node that first needs
  to free up storage space.

balancing:
  method: io_smart
  balanciness: 5
  w_io_usage: 1
  w_io_psi: 10 # Focus on pressure

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64, storage_free: {local: 100}, io_pressure: 25.0}
  node-B: {cpu_total: 10, memory_total_gb: 64, storage_free: {local: 50}, io_pressure: 0.0}

vms:
  # vm-a is the pressure hog on node-A. It needs 40GB space on B.
  vm-a: {node: node-A, cpu: 1, memory_gb: 4, disks: {local: 40}, io_pressure: 20.0}

  # vm-b is a quiet VM on node-B, but it occupies 45GB.
  # Node-B only has 50GB free. 50 + 45 = 95. If vm-b moves to A, node-B has 95 free.
  vm-b: {node: node-B, cpu: 1, memory_gb: 4, disks: {local: 45}, io_pressure: 0.0}

expect:
  feasible: true
  path_feasible: true
  placements:
    vm-a: node-B
    vm-b: node-A
