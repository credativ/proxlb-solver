name: "Parallel Independent"
description: "Three VMs on one overloaded node can migrate independently to different nodes."

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64
  node-D:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-1:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  vm-2:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  vm-3:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  spread_improved: true
