name: "Loop Required — Deadlock Bypass"
description: >
  VM-A (55 GB on node-B) and VM-B (45 GB on node-A) should swap for
  near-perfect balance (68.8 % vs 70.3 %). But both nodes are too full
  for either VM to land while the other is still there, and node-C is in
  maintenance — no temp node available. The planner detects an unbreakable
  cycle. The solve_reachable loop forbids this swap and the solver falls
  back to the current (suboptimal) placement as the best reachable state.
  This demonstrates the retry loop (attempts > 1) resolving successfully.

balancing:
  method: memory
  balanciness: 5
  cpu_overcommit: 1.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 80
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64
    maintenance: true

vms:
  vm-a:
    node: node-B
    cpu: 4
    memory_gb: 55
    type: vm
  vm-b:
    node: node-A
    cpu: 4
    memory_gb: 45
    type: vm

constraints: {}

expect:
  feasible: true
  constraints_satisfied: true
  path_feasible: true
