name: "long cycle with full nodes"
description: >
  Complex dependency cycle with very tight capacity. 
  node-spare (2GB) is the only free space, but vm-0 needs 3GB.
  This test checks if the solver correctly identifies reachability deadlocks.

balancing:
  method: memory
  balanciness: 5

cpu_overcommit: 1

nodes:
  node-spare-init: {cpu_total: 2, memory_total_gb: 2}
  node-0: {cpu_total: 4, memory_total_gb: 4}
  node-1: {cpu_total: 4, memory_total_gb: 4}
  node-spare: {cpu_total: 2, memory_total_gb: 2}

vms:
  vm-0: {node: node-1, cpu: 3, memory_gb: 3, type: vm}
  vm-1: {node: node-0, cpu: 1, memory_gb: 1, type: vm}
  vm-2: {node: node-0, cpu: 1, memory_gb: 1, type: vm}
  vm-3: {node: node-1, cpu: 1, memory_gb: 1, type: vm}
  vm-4: {node: node-0, cpu: 2, memory_gb: 2, type: vm}
  vm-spare: {node: node-spare-init, cpu: 2, memory_gb: 2, type: vm}

constraints:
  pin:
    - vm: vm-0
      nodes: [node-0, node-spare]
    - vm: vm-1
      nodes: [node-1, node-spare]
    - vm: vm-2
      nodes: [node-1, node-spare]
    - vm: vm-3
      nodes: [node-0, node-spare]
    - vm: vm-4
      nodes: [node-1, node-spare]
    - vm: vm-spare
      nodes: [node-spare]

expect:
  feasible: true
  constraints_satisfied: true
