name: "Evacuate Node with Parking"
description: >
  Node-A is full. We want to evacuate it.
  The solver must move VM-A to Node-C.

balancing:
  method: memory
  balanciness: 5

evacuate_node: "node-A"

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 16}
  node-B: {cpu_total: 16, memory_total_gb: 16}
  node-C: {cpu_total: 16, memory_total_gb: 16}

vms:
  vm-a: {node: node-A, cpu: 4, memory_gb: 16}
  vm-b: {node: node-B, cpu: 4, memory_gb: 16}

expect:
  feasible: true
  max_migrations: 1
  placements:
    vm-a: node-C
