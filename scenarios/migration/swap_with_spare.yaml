name: "Circular Swap with Spare Node"
description: >
  Node-A and Node-B are full. Node-C is empty.
  We want to swap VM-A and VM-B.
  The solver must use Node-C as a temporary parking spot.

balancing:
  method: memory
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 16}
  node-B: {cpu_total: 32, memory_total_gb: 32} # Node B is largest
  node-C: {cpu_total: 8, memory_total_gb: 8}   # Node C is smallest

vms:
  vm-a: {node: node-A, cpu: 4, memory_gb: 16, priority: 3}
  vm-b: {node: node-B, cpu: 4, memory_gb: 16, priority: 1}

expect:
  feasible: true
  max_migrations: 3
  placements:
    vm-a: node-B
    vm-b: node-A
