name: "Maintenance Evacuation Cascade"
description: "Node pve-01 enters maintenance — 6 VMs must evacuate, but target nodes are nearly full. Resident VMs must relocate first, creating a multi-step cascade."

balancing:
  method: memory
  balanciness: 4
  cpu_overcommit: 2.0

nodes:
  pve-01:
    cpu_total: 32
    memory_total_gb: 256
    maintenance: true
  pve-02:
    cpu_total: 32
    memory_total_gb: 256
  pve-03:
    cpu_total: 32
    memory_total_gb: 256
  pve-04:
    cpu_total: 32
    memory_total_gb: 256

vms:
  # pve-01 (maintenance): 176 GB — must evacuate
  prod-db:
    node: pve-01
    cpu: 8
    memory_gb: 64
    type: vm
  prod-api-01:
    node: pve-01
    cpu: 4
    memory_gb: 32
    type: vm
  prod-api-02:
    node: pve-01
    cpu: 4
    memory_gb: 32
    type: vm
  prod-web-01:
    node: pve-01
    cpu: 2
    memory_gb: 16
    type: vm
  prod-web-02:
    node: pve-01
    cpu: 2
    memory_gb: 16
    type: vm
  prod-mon:
    node: pve-01
    cpu: 2
    memory_gb: 16
    type: vm
  # pve-02: 240 GB used (93.75%) — only 16 GB free
  legacy-erp:
    node: pve-02
    cpu: 8
    memory_gb: 128
    type: vm
  legacy-crm:
    node: pve-02
    cpu: 4
    memory_gb: 64
    type: vm
  legacy-bi:
    node: pve-02
    cpu: 4
    memory_gb: 48
    type: vm
  # pve-03: 240 GB used (93.75%) — only 16 GB free
  staging-db:
    node: pve-03
    cpu: 8
    memory_gb: 96
    type: vm
  staging-app:
    node: pve-03
    cpu: 4
    memory_gb: 80
    type: vm
  staging-cache:
    node: pve-03
    cpu: 2
    memory_gb: 48
    type: vm
  staging-log:
    node: pve-03
    cpu: 2
    memory_gb: 16
    type: vm
  # pve-04: 96 GB used (37.5%)
  batch-etl:
    node: pve-04
    cpu: 8
    memory_gb: 64
    type: vm
  batch-report:
    node: pve-04
    cpu: 4
    memory_gb: 32
    type: vm

constraints:
  pin:
    - vm: prod-db
      nodes: [pve-02]
    - vm: prod-api-01
      nodes: [pve-03]
    - vm: prod-api-02
      nodes: [pve-03]

expect:
  feasible: true
  constraints_satisfied: true
  node_empty: pve-01
  placements:
    prod-db: pve-02
    prod-api-01: pve-03
    prod-api-02: pve-03
