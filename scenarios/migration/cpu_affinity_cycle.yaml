name: "CPU Affinity Cycle — Maintenance"
description: >
  A cycle where Node-A enters maintenance. All VMs must move.
  Group-A has affinity and must move together.

balancing:
  method: cpu
  balanciness: 5
  w_stickiness: 0

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64, maintenance: true}
  node-B: {cpu_total: 16, memory_total_gb: 64}
  node-C: {cpu_total: 16, memory_total_gb: 64}

vms:
  vm-a1: {node: node-A, cpu: 2, memory_gb: 4, cpu_usage: 5.0}
  vm-a2: {node: node-A, cpu: 2, memory_gb: 4, cpu_usage: 5.0}
  vm-b: {node: node-B, cpu: 2, memory_gb: 4, cpu_usage: 5.0}

constraints:
  affinity:
    - {name: "Group-A", vms: ["vm-a1", "vm-a2"]}

expect:
  feasible: true
  node_empty: "node-A"
  path_feasible: true
