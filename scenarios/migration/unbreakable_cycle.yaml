name: "Unbreakable Cycle — No Migration Path"
description: >
  vm-a (50 GB) is pinned to node-B and vm-b (50 GB) is pinned to node-A,
  but they currently sit on the wrong nodes. Both nodes have 60 GB total,
  so neither can host both VMs at once. The only other node (node-C) is
  on maintenance. No temp node exists → migration path is infeasible
  even though the target placement is valid.

balancing:
  method: memory
  balanciness: 5
  cpu_overcommit: 1.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 60
  node-B:
    cpu_total: 16
    memory_total_gb: 60
  node-C:
    cpu_total: 16
    memory_total_gb: 64
    maintenance: true

vms:
  vm-a:
    node: node-A
    cpu: 4
    memory_gb: 50
    type: vm
  vm-b:
    node: node-B
    cpu: 4
    memory_gb: 50
    type: vm

constraints:
  pin:
    - vm: vm-a
      nodes: [node-B]
    - vm: vm-b
      nodes: [node-A]

expect:
  feasible: true
  constraints_satisfied: true
