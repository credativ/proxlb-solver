name: "Already Balanced"
description: "All nodes have equal load — no migrations needed."

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64

vms:
  web-01:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  web-02:
    node: node-B
    cpu: 2
    memory_gb: 16
    type: vm
  web-03:
    node: node-C
    cpu: 2
    memory_gb: 16
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  max_migrations: 0
