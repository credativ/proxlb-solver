name: "Memory Threshold — Suppress balancing in empty cluster"
description: >
  Cluster with 2 nodes and 1 VM. Initially VM is on node-A.
  Node-A is only 50% full. Even though node-B is empty (Load Gap),
  the memory_threshold is set to 80%.
  The solver should NOT move the VM.

balancing:
  method: memory
  memory_threshold: 80
  balanciness: 5 # Aggressive balancing would normally trigger a move

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64}
  node-B: {cpu_total: 16, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 4, memory_gb: 32}

expect:
  feasible: true
  max_migrations: 0
