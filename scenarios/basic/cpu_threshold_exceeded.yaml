name: "CPU Threshold Exceeded — Rebalance when busy"
description: >
  Node-A is 100% full (14 + 2 / 16).
  CPU threshold is set to 80%.
  Moving the smaller VM-2 to Node-B reduces the gap from 100% to 75%.

balancing:
  method: cpu
  cpu_threshold: 80
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64}
  node-B: {cpu_total: 16, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 4, memory_gb: 4, cpu_usage: 14.0, priority: 1} # 87.5%
  vm-2: {node: node-A, cpu: 4, memory_gb: 4, cpu_usage: 2.0, priority: 1} # 12.5%

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
  placements:
    vm-1: node-A
    vm-2: node-B
