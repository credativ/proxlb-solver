name: "CPU Threshold — Moderate Level"
description: >
  10% CPU load gap with balanciness=3 (threshold 15%). Should not move VMs.

balancing:
  method: cpu
  balanciness: 3

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64}
  node-B: {cpu_total: 10, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 2, memory_gb: 8, cpu_usage: 6.0} # 60% load
  vm-2: {node: node-B, cpu: 2, memory_gb: 8, cpu_usage: 5.0} # 50% load -> Gap 10%

expect:
  feasible: true
  max_migrations: 0
