name: "Global Smart — Resource Conflict"
description: >
  Node-A has spare RAM but is CPU-starved. Node-B has spare CPU but is RAM-starved.
  A 'balanced' VM is moved to the node that offers the better weighted
  compromise. In this case, we weight CPU higher than RAM.

balancing:
  method: global_smart
  balanciness: 5
  w_global_mem: 1   # Low importance for RAM
  w_global_cpu: 10  # High importance for CPU
  w_stickiness: 0

nodes:
  node-A: {cpu_total: 4, memory_total_gb: 128} # RAM-rich, CPU-poor
  node-B: {cpu_total: 32, memory_total_gb: 16}  # CPU-rich, RAM-poor

vms:
  vm-test: {node: node-A, cpu: 2, memory_gb: 8, cpu_usage: 3.0}

expect:
  feasible: true
  placements:
    vm-test: node-B # CPU wins because of higher weight
