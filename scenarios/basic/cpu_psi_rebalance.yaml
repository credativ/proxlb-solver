name: "CPU PSI Balancing — Contention Spread"
description: >
  Cluster with 4 VMs. CPU usage is low (10%) for all, but two VMs have high PSI (50%)
  due to resource contention. Both are on node-A. Solver should move one to node-B.

balancing:
  method: cpu_psi
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64}
  node-B: {cpu_total: 16, memory_total_gb: 64}

vms:
  vm-1: {node: node-A, cpu: 2, memory_gb: 4, cpu_usage: 0.2, cpu_pressure: 50.0}
  vm-2: {node: node-A, cpu: 2, memory_gb: 4, cpu_usage: 0.2, cpu_pressure: 50.0}
  vm-3: {node: node-B, cpu: 2, memory_gb: 4, cpu_usage: 0.2, cpu_pressure: 0.0}
  vm-4: {node: node-B, cpu: 2, memory_gb: 4, cpu_usage: 0.2, cpu_pressure: 0.0}

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
