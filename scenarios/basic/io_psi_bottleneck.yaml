name: "IO PSI — Storage Bottleneck"
description: >
  Two VMs generate heavy IO load, causing stalling on Node-A.
  Solver should spread the IO pressure across the cluster.

balancing:
  method: io_psi
  balanciness: 5

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64, io_pressure: 25.0}
  node-B: {cpu_total: 10, memory_total_gb: 64, io_pressure: 0.0}

vms:
  vm-io-1: {node: node-A, cpu: 1, memory_gb: 4, io_pressure: 12.0}
  vm-io-2: {node: node-A, cpu: 1, memory_gb: 4, io_pressure: 13.0}
  vm-quiet: {node: node-B, cpu: 1, memory_gb: 4, io_pressure: 0.0}

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
