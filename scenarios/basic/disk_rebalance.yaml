name: "Disk Balancing — Local Storage Spread"
description: >
  Cluster with 4 VMs using local disks. Initially node-A has 3 VMs (total 300GB),
  node-B has 1 VM (100GB). Solver should move one VM to node-B to balance disk usage.

balancing:
  method: disk
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64, storage_free: {local: 1000}}
  node-B: {cpu_total: 16, memory_total_gb: 64, storage_free: {local: 1000}}

vms:
  vm-1: {node: node-A, cpu: 1, memory_gb: 4, disks: {local: 100}}
  vm-2: {node: node-A, cpu: 1, memory_gb: 4, disks: {local: 100}}
  vm-3: {node: node-A, cpu: 1, memory_gb: 4, disks: {local: 100}}
  vm-4: {node: node-B, cpu: 1, memory_gb: 4, disks: {local: 100}}

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
