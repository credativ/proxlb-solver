name: "Single VM Move"
description: "Three VMs on node-A, one on node-B — move one VM to balance."

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-01:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  vm-02:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  vm-03:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  vm-04:
    node: node-B
    cpu: 2
    memory_gb: 16
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  spread_improved: true
  max_migrations: 1
