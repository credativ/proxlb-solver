name: "Local Disk Avoidance"
description: |
  Two VMs on node-A: vm-ramonly (4 GiB RAM, no local disk) and
  vm-diskvm (4 GiB RAM, 100 GiB local disk). node-B is empty.
  Both migrations achieve the same RAM balance, but vm-diskvm costs
  4× more to move (local disk = full sequential copy).
  The solver must migrate vm-ramonly and keep vm-diskvm in place.

balancing:
  method: memory
  balanciness: 5
  w_stickiness: 1

nodes:
  node-A:
    cpu_total: 4
    memory_total_gb: 64
    storage_free:
      local-lvm: 200
  node-B:
    cpu_total: 4
    memory_total_gb: 64
    storage_free:
      local-lvm: 200

vms:
  vm-ramonly:
    node: node-A
    cpu: 2
    memory_gb: 4
  vm-diskvm:
    node: node-A
    cpu: 2
    memory_gb: 4
    disks:
      local-lvm: 100

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
  placements:
    vm-ramonly: node-B
    vm-diskvm: node-A
