name: "Balanciness Level 2 — Above Threshold"
description: >
  Cluster with 40% load gap and balanciness=2 (Low). 
  Threshold for Level 2 is 25%. Rebalancing should occur.

balancing:
  method: memory
  balanciness: 2

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 100
  node-B:
    cpu_total: 16
    memory_total_gb: 100

vms:
  vm-1:
    node: node-A
    cpu: 2
    memory_gb: 20
  vm-2:
    node: node-A
    cpu: 2
    memory_gb: 20

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
