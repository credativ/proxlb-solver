name: "CPU Rebalance — Affinity Group"
description: >
  Rebalancing a cluster by CPU load. 
  Initial: Node-A has 3 VMs (4.0 load each) = 12.0 (75%). Node-B is empty.
  Moving vm-a3 results in A=8.0 (50%) and B=4.0 (25%). Gap 25% < 75%.

balancing:
  method: cpu
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 128}
  node-B: {cpu_total: 16, memory_total_gb: 128}

vms:
  vm-a1: {node: node-A, cpu: 2, memory_gb: 8, cpu_usage: 4.0}
  vm-a2: {node: node-A, cpu: 2, memory_gb: 8, cpu_usage: 4.0}
  vm-a3: {node: node-A, cpu: 2, memory_gb: 8, cpu_usage: 4.0}

constraints:
  affinity:
    - name: group-A
      vms: [vm-a1, vm-a2]

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
  placements:
    vm-a3: node-B
