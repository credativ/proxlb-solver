name: "Balanciness Level 2 — Below Threshold"
description: >
  Cluster with ~10% load gap and balanciness=2 (Low). The migration
  threshold for level 2 is 25%, so 10% gap is below threshold.
  No voluntary migrations should occur despite the imbalance.

balancing:
  method: memory
  balanciness: 2
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  app-01:
    node: node-A
    cpu: 2
    memory_gb: 20
    type: vm
  app-02:
    node: node-B
    cpu: 2
    memory_gb: 14
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  max_migrations: 0
