name: "Global Smart Balancing — Multi-Resource compromise"
description: >
  Demonstrates that the solver balances RAM and CPU simultaneously.
  vm-ram-hog should move to node-A (lots of RAM free).
  vm-cpu-hog should move to node-B (lots of CPU free).

balancing:
  method: global_smart
  balanciness: 5
  w_global_mem: 10
  w_global_cpu: 10
  w_stickiness: 0

nodes:
  node-A: {cpu_total: 4, memory_total_gb: 128}
  node-B: {cpu_total: 32, memory_total_gb: 16}

vms:
  vm-ram-hog: {node: node-B, cpu: 1, memory_gb: 12, cpu_usage: 0.1}
  vm-cpu-hog: {node: node-A, cpu: 4, memory_gb: 2, cpu_usage: 3.5}

expect:
  feasible: true
  spread_improved: true
  placements:
    vm-ram-hog: node-A
    vm-cpu-hog: node-B
