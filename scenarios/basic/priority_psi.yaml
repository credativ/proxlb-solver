name: "VM Priorities — PSI Contention"
description: >
  Two VMs have the same PSI pressure (10%).
  The high-priority VM must be moved to an idle node first.

balancing:
  method: cpu_psi
  balanciness: 5
  w_stickiness: 0

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 20.0}
  node-B: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 0.0}

vms:
  vm-high: {node: node-A, cpu: 1, memory_gb: 4, cpu_pressure: 10.0, priority: 3}
  vm-low: {node: node-A, cpu: 1, memory_gb: 4, cpu_pressure: 10.0, priority: 1}

expect:
  feasible: true
  placements:
    vm-high: node-B
