name: "Balanciness Level 1 — Conservative"
description: >
  Slightly imbalanced cluster with balanciness=1 (Conservative).
  Like VMware DRS Level 1: only mandatory migrations (maintenance,
  constraints). No voluntary rebalancing should occur.

balancing:
  method: memory
  balanciness: 1
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  app-01:
    node: node-A
    cpu: 2
    memory_gb: 24
    type: vm
  app-02:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  app-03:
    node: node-B
    cpu: 2
    memory_gb: 8
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  max_migrations: 0
