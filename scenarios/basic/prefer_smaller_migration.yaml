name: "Prefer Smaller Migration"
description: |
  Two VMs on node-A: one large (8 GiB), one small (512 MiB).
  node-B is empty. Both migrations achieve identical RAM balance,
  but moving vm-small is cheaper (2 cost units vs 32).
  The solver must prefer the cheaper migration.

balancing:
  method: memory
  balanciness: 5   # aggressive — always migrate even for small gaps
  w_stickiness: 1  # keep stickiness low so cost model is decisive

nodes:
  node-A:
    cpu_total: 4
    memory_total_gb: 32
  node-B:
    cpu_total: 4
    memory_total_gb: 32

vms:
  vm-large:
    node: node-A
    cpu: 2
    memory_gb: 8
  vm-small:
    node: node-A
    cpu: 1
    memory_gb: 0.5

expect:
  feasible: true
  spread_improved: true
  max_migrations: 1
  placements:
    vm-small: node-B
