name: "Combined Constraints Fix"
description: >
  vm-1 is on node-A but pinned to node-C.
  vm-2 is on node-B.
  Affinity requires [vm-1, vm-2] to be together.
  Result: Both must move to node-C.

balancing:
  method: memory
  balanciness: 1

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-1:
    node: node-A
    cpu: 2
    memory_gb: 8
  vm-2:
    node: node-B
    cpu: 2
    memory_gb: 8

constraints:
  affinity:
    - name: group-1
      vms: [vm-1, vm-2]
  pin:
    - vm: vm-1
      nodes: [node-C]

expect:
  feasible: true
  constraints_satisfied: true
  max_migrations: 2
  placements:
    vm-1: node-C
    vm-2: node-C
