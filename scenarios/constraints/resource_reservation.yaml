name: "Resource Reservation — Host Buffer"
description: >
  vm-1 (60 GB) wants to stay on node-A (64 GB).
  However, a host reservation of 8 GB is defined.
  The usable RAM is only 56 GB, so vm-1 MUST move to node-B.

balancing:
  method: memory
  balanciness: 1

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
    reserve:
      memory_gb: 8
  node-B:
    cpu_total: 16
    memory_total_gb: 128

vms:
  vm-1:
    node: node-A
    cpu: 4
    memory_gb: 60

expect:
  feasible: true
  max_migrations: 1
  placements:
    vm-1: node-B
