name: "CPU PSI — Anti-Affinity Constraint"
description: >
  Rebalancing CPU pressure must respect anti-affinity.
  Stickiness set to 0 to ensure migration.

balancing:
  method: cpu_psi
  balanciness: 5
  w_stickiness: 0

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 20.0}
  node-B: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 0.0}
  node-C: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 0.0}

vms:
  vm-stalling: {node: node-A, cpu: 1, memory_gb: 4, cpu_pressure: 15.0}
  vm-group-mate: {node: node-B, cpu: 1, memory_gb: 4, cpu_pressure: 0.0}

constraints:
  anti_affinity:
    - {name: "Group-1", vms: ["vm-stalling", "vm-group-mate"]}

expect:
  feasible: true
  placements:
    vm-stalling: node-C # MUST go to C because B is blocked by AA
