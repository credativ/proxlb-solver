name: "LXC Affinity — Forced Group"
description: >
  Two containers with affinity must stay on the same node.
  They start on different nodes, solver must move one to join the other.

balancing:
  method: memory
  balanciness: 5

nodes:
  node-A: {cpu_total: 16, memory_total_gb: 64}
  node-B: {cpu_total: 16, memory_total_gb: 64}

vms:
  ct-1: {node: node-A, cpu: 2, memory_gb: 4, type: "ct", tags: ["plb_affinity_group1"]}
  ct-2: {node: node-B, cpu: 2, memory_gb: 4, type: "ct", tags: ["plb_affinity_group1"]}

expect:
  feasible: true
  max_migrations: 1
  placements:
    ct-2: "== ct-1"
