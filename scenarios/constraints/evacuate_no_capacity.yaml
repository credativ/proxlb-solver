name: "Evacuate Node — No Capacity"
description: >
  Node-B must be drained, but the remaining nodes are already
  nearly full. There is not enough RAM to absorb all VMs from
  node-B. The solver should report infeasible and list the
  blocking VMs.

evacuate_node: node-B

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64

vms:
  big-a:
    node: node-A
    cpu: 4
    memory_gb: 48
    type: vm
  big-b1:
    node: node-B
    cpu: 4
    memory_gb: 32
    type: vm
  big-b2:
    node: node-B
    cpu: 4
    memory_gb: 32
    type: vm
  big-c:
    node: node-C
    cpu: 4
    memory_gb: 48
    type: vm

expect:
  feasible: false
