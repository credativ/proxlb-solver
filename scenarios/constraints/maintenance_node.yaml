    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  app-02:
    node: node-B
    cpu: 2
    memory_gb: 16
    type: vm
  app-03:
    node: node-B
    cpu: 2
    memory_gb: 16
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
