name: "Storage Capacity — Target Full"
description: >
  vm-1 wants to move to node-B for better RAM balance. node-B has enough RAM,
  but its 'local-lvm' storage is too full to host vm-1's 100GB disk.

balancing:
  method: memory
  balanciness: 5

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
    storage_free: {local-lvm: 500}
  node-B:
    cpu_total: 16
    memory_total_gb: 64
    storage_free: {local-lvm: 50} # Only 50GB free!

vms:
  vm-1:
    node: node-A
    cpu: 4
    memory_gb: 32
    disks: {local-lvm: 100} # Needs 100GB

expect:
  feasible: true
  max_migrations: 0
