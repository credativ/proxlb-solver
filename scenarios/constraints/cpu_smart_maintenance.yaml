name: "CPU Smart — Maintenance Evacuation"
description: >
  Evacuating a node while balancing both usage and PSI on the targets.

balancing:
  method: cpu_smart
  balanciness: 5
  w_cpu_usage: 1
  w_cpu_psi: 1

nodes:
  node-A: {cpu_total: 10, memory_total_gb: 64, maintenance: true}
  node-B: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 10.0}
  node-C: {cpu_total: 10, memory_total_gb: 64, cpu_pressure: 0.0}

vms:
  vm-heavy: {node: node-A, cpu: 1, memory_gb: 4, cpu_usage: 8.0, cpu_pressure: 1.0}
  vm-stalling: {node: node-A, cpu: 1, memory_gb: 4, cpu_usage: 1.0, cpu_pressure: 15.0}

expect:
  feasible: true
  node_empty: "node-A"
  placements:
    vm-heavy: node-C # Should go to the node with lower pressure/usage
    vm-stalling: node-B # Distribution!
