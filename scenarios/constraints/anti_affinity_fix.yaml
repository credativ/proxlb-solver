name: "Anti-Affinity Constraint Fix"
description: >
  vm-1 and vm-2 are initially on the same node (node-A).
  An anti-affinity rule requires them to be on different nodes.
  The solver must move one of them away.

balancing:
  method: memory
  balanciness: 1  # Conservative

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64

vms:
  vm-1:
    node: node-A
    cpu: 2
    memory_gb: 8
  vm-2:
    node: node-A
    cpu: 2
    memory_gb: 8

constraints:
  anti_affinity:
    - name: must-be-separate
      vms: [vm-1, vm-2]

expect:
  feasible: true
  constraints_satisfied: true
  max_migrations: 1

