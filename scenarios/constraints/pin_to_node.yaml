name: "Pin to Node"
description: "Monitor VM must stay on node-C."

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 16
    memory_total_gb: 64
  node-B:
    cpu_total: 16
    memory_total_gb: 64
  node-C:
    cpu_total: 16
    memory_total_gb: 64

vms:
  app-01:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  app-02:
    node: node-A
    cpu: 2
    memory_gb: 16
    type: vm
  monitor:
    node: node-C
    cpu: 1
    memory_gb: 4
    type: vm

constraints:
  pin:
    - vm: monitor
      nodes: [node-C]
      strict: true

expect:
  feasible: true
  constraints_satisfied: true
  placements:
    monitor: node-C
