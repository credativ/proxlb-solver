name: "Stacking Bug Regression"
description: >
  Reproduces a known greedy-algorithm bug where VMs get stacked
  on a single node because the greedy heuristic keeps picking
  the least-loaded node without looking ahead. The CP-SAT solver
  should distribute VMs evenly.

balancing:
  method: memory
  cpu_overcommit: 2.0

nodes:
  node-A:
    cpu_total: 32
    memory_total_gb: 128
  node-B:
    cpu_total: 32
    memory_total_gb: 128
  node-C:
    cpu_total: 32
    memory_total_gb: 128

vms:
  vm-01:
    node: node-A
    cpu: 4
    memory_gb: 32
    type: vm
  vm-02:
    node: node-A
    cpu: 4
    memory_gb: 32
    type: vm
  vm-03:
    node: node-A
    cpu: 4
    memory_gb: 32
    type: vm
  vm-04:
    node: node-A
    cpu: 4
    memory_gb: 16
    type: vm
  vm-05:
    node: node-A
    cpu: 4
    memory_gb: 16
    type: vm

expect:
  feasible: true
  constraints_satisfied: true
  spread_improved: true
  max_migrations: 4
